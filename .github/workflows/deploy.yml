name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Publish Blazor WASM
        run: dotnet publish WilliamMulrine/WilliamMulrine.csproj -c Release -o publish

      - name: Fix GitHub Pages base path for subfolder repos
        # If your repo is NOT username.github.io (i.e., it's username.github.io/repo-name),
        # update the <base href> tag so routing works correctly.
        # Replace YOUR_REPO_NAME with your actual GitHub repository name.
        # Comment this step out if your repo IS named username.github.io.
        run: |
          sed -i 's|<base href="/" />|<base href="/YOUR_REPO_NAME/" />|g' publish/wwwroot/index.html

      - name: Add .nojekyll
        run: touch publish/wwwroot/.nojekyll

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: publish/wwwroot
